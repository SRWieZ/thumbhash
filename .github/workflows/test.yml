name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}


    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: [7.3, 7.4, 8.1, 8.2, 8.3, 8.4, 8.5]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: xdebug

      - name: Install Dependencies
        run: composer update -W --dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        if: matrix.php <= 8.1
        run: ./vendor/bin/pest --ci

      - name: Run tests
        if: matrix.php == 8.2
        run: ./vendor/bin/pest --ci --display-deprecations

      - name: Run tests
        if: matrix.php >= 8.3
        run: ./vendor/bin/pest --ci --fail-on-deprecation

